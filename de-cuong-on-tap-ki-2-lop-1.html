<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Ôn Tập Toán – Lớp 1</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #29B6F6;
    --sun: #FFD54F;
    --grass: #66BB6A;
    --coral: #FF7043;
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --text: #1A237E;
    --muted: #78909C;
    --radius: 20px;
    --correct: #43A047;
    --wrong: #E53935;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 15%, #FFF3E055 0%, transparent 50%),
      radial-gradient(circle at 85% 85%, #E3F2FD55 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .shape {
    position: absolute; border-radius: 50%; opacity: 0.07;
    animation: drift ease-in-out infinite;
  }
  @keyframes drift {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-28px) rotate(18deg); }
  }

  header {
    position: relative; z-index: 10;
    text-align: center; padding: 44px 20px 16px;
  }
  .school-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: white; border: 2px solid #FFE0B2;
    color: var(--coral);
    font-family: 'Baloo 2', cursive;
    font-size: 0.8rem; font-weight: 700;
    padding: 6px 16px; border-radius: 50px;
    margin-bottom: 16px;
    box-shadow: 0 3px 12px #FF704318;
  }
  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.9rem, 5vw, 3.2rem);
    font-weight: 800; color: var(--text); line-height: 1.1;
  }
  h1 em { color: var(--coral); font-style: normal; }
  .subtitle { margin-top: 8px; color: var(--muted); font-size: 0.95rem; }
  .deco {
    font-size: 2rem; margin-top: 10px; display: block;
    animation: bounce 2.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); }
  }

  /* EXAM SELECTOR */
  .exam-section {
    position: relative; z-index: 10;
    max-width: 760px; margin: 0 auto;
    padding: 0 20px 10px;
  }
  .exam-label {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 700;
    color: var(--muted); text-align: center; margin-bottom: 14px;
  }
  .exam-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px; margin-bottom: 28px;
  }
  .exam-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 0.95rem; font-weight: 800;
    padding: 12px 6px;
    border: 2.5px solid #E0E0E0; border-radius: 14px;
    background: white; color: var(--muted);
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .exam-btn:hover { border-color: var(--coral); color: var(--coral); transform: translateY(-2px); }
  .exam-btn.active {
    background: var(--coral); color: white;
    border-color: #E64A19;
    box-shadow: 0 4px 14px #FF704340;
    transform: translateY(-2px);
  }

  /* QUIZ WRAP */
  .quiz-wrap {
    position: relative; z-index: 10;
    max-width: 720px; margin: 0 auto;
    padding: 0 20px 70px;
  }

  /* progress */
  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .progress-bar-bg { flex: 1; height: 10px; background: #ECEFF1; border-radius: 50px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; border-radius: 50px;
    background: linear-gradient(90deg, var(--coral), var(--sun));
    transition: width 0.5s ease;
  }
  .progress-label {
    font-family: 'Baloo 2', cursive;
    font-weight: 700; font-size: 0.9rem; color: var(--muted); white-space: nowrap;
  }

  /* question card */
  .question-card {
    background: white; border-radius: var(--radius);
    padding: 32px 28px 24px;
    box-shadow: 0 6px 28px #1A237E10;
    animation: slideUp 0.35s ease;
    border-left: 6px solid var(--coral);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .q-tag {
    font-family: 'Baloo 2', cursive;
    font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: white; background: var(--coral);
    padding: 3px 12px; border-radius: 50px;
  }
  .q-counter { font-family: 'Baloo 2', cursive; font-size: 0.85rem; font-weight: 700; color: var(--muted); }

  .q-text { font-size: 1.15rem; font-weight: 700; line-height: 1.65; color: var(--text); margin-bottom: 22px; }

  .options { display: grid; gap: 11px; }
  .option-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 18px;
    border: 2.5px solid #ECEFF1; border-radius: 13px;
    background: #FAFAFA; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 600; color: var(--text);
    transition: all 0.18s; text-align: left;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--coral); background: #FFF3E0; transform: translateX(5px);
  }
  .option-letter {
    min-width: 34px; height: 34px; border-radius: 50%;
    background: #ECEFF1; display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 0.9rem;
    transition: all 0.18s; flex-shrink: 0;
  }
  .option-btn.correct { border-color: var(--correct); background: #E8F5E9; color: #1B5E20; }
  .option-btn.correct .option-letter { background: var(--correct); color: white; }
  .option-btn.wrong { border-color: var(--wrong); background: #FFEBEE; color: #B71C1C; }
  .option-btn.wrong .option-letter { background: var(--wrong); color: white; }

  .feedback {
    margin-top: 18px; padding: 13px 18px; border-radius: 12px;
    font-weight: 700; font-size: 0.97rem;
    display: none; align-items: center; gap: 10px;
    animation: popIn 0.25s ease;
  }
  @keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: #E8F5E9; color: #2E7D32; border: 2px solid #C8E6C9; }
  .feedback.wrong-fb { background: #FFEBEE; color: #C62828; border: 2px solid #FFCDD2; }
  .fb-icon { font-size: 1.4rem; }

  .nav-row { display: flex; gap: 12px; margin-top: 22px; }
  .nav-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 700;
    padding: 13px 28px; border: none; border-radius: 13px;
    cursor: pointer; transition: all 0.18s; flex: 1;
  }
  .nav-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .nav-btn.prev { background: #ECEFF1; color: var(--muted); }
  .nav-btn.next { background: var(--coral); color: white; box-shadow: 0 4px 14px #FF704338; }
  .nav-btn:disabled { opacity: 0.38; cursor: default; transform: none !important; }

  /* SCORE SCREEN */
  .score-screen { display: none; animation: slideUp 0.4s ease; }
  .score-screen.show { display: block; }
  .score-card {
    background: white; border-radius: var(--radius);
    padding: 50px 32px 40px; text-align: center;
    box-shadow: 0 8px 40px #1A237E12;
  }
  .score-emoji { font-size: 5rem; margin-bottom: 14px; }
  .score-title { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800; color: var(--muted); margin-bottom: 6px; }
  .score-number { font-family: 'Baloo 2', cursive; font-size: 4.5rem; font-weight: 800; color: var(--coral); line-height: 1; }
  .score-desc { margin-top: 14px; color: var(--muted); font-size: 1.05rem; line-height: 1.6; }
  .score-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; justify-content: center; }
  .action-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 700;
    padding: 14px 32px; border: none; border-radius: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .action-btn:hover { transform: translateY(-3px); }
  .btn-retry { background: var(--grass); color: white; box-shadow: 0 4px 14px #66BB6A38; }
  .btn-change { background: #ECEFF1; color: var(--text); }

  .review-section { margin-top: 24px; }
  .review-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem; font-weight: 800; color: var(--text);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .review-item {
    background: white; border-radius: 13px;
    padding: 14px 18px; margin-bottom: 10px;
    box-shadow: 0 2px 8px #0001; border-left: 4px solid #ECEFF1;
  }
  .review-item.ok { border-left-color: var(--correct); }
  .review-item.fail { border-left-color: var(--wrong); }
  .review-q { font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; }
  .review-ans { font-size: 0.88rem; color: var(--muted); }
  .review-ans strong { color: var(--correct); }
  .user-wrong { color: var(--wrong); }

  .confetti-piece {
    position: fixed; top: -20px; border-radius: 3px;
    animation: fall linear forwards; pointer-events: none; z-index: 999;
  }
  @keyframes fall { to { top: 110vh; transform: rotate(720deg) translateX(50px); opacity: 0; } }

  @media (max-width: 520px) {
    .exam-grid { gap: 7px; }
    .exam-btn { font-size: 0.82rem; padding: 10px 2px; }
    .question-card { padding: 22px 16px 18px; }
    h1 { font-size: 1.7rem; }
  }
</style>
</head>
<body>

<div class="shapes" id="shapes"></div>

    <div class="progress-label" id="progressLabel">0 / 0</div>

    <div class="review-section" id="reviewSection"></div>

</div>

let currentExam = 0;
let questions = [];
let current = 0;
let score = 0;
let userAnswers = [];

function buildExamGrid() {
  const grid = document.getElementById('examGrid');
  grid.innerHTML = '';
  EXAMS.forEach((ex, i) => {
    const btn = document.createElement('button');
    btn.className = 'exam-btn' + (i === currentExam ? ' active' : '');
    btn.textContent = ex.title;
    btn.onclick = () => selectExam(i);
    grid.appendChild(btn);
  });
}

function selectExam(idx) {
  currentExam = idx;
  buildExamGrid();
  startExam();
}

function startExam() {
  questions = [...EXAMS[currentExam].questions];
  current = 0; score = 0;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  document.getElementById('quizArea').innerHTML = '';
  render();
  document.querySelector('.quiz-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function render() {
  updateProgress();
  const q = questions[current];
  const sel = userAnswers[current];
  const locked = sel !== null;
  const letters = ['A','B','C','D'];

  const optsHTML = q.opts.map((o, i) => {
    let cls = '';
    if (locked) {
      if (i === q.ans) cls = 'correct';
      else if (i === sel) cls = 'wrong';
    }
    return `<button class="option-btn ${cls}" onclick="choose(${i})" ${locked ? 'disabled' : ''}>
      <span class="option-letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (locked) {
    const ok = sel === q.ans;
    feedbackHTML = `<div class="feedback ${ok ? 'correct-fb' : 'wrong-fb'} show">
      <span class="fb-icon">${ok ? '🌟' : '💡'}</span>
      <span>${ok ? 'Chính xác! Giỏi lắm!' : `Đáp án đúng là: <strong>${letters[q.ans]}. ${q.opts[q.ans]}</strong>`}</span>
    </div>`;
  }

  const isLast = current === questions.length - 1;
  document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag">${EXAMS[currentExam].title}</span>
        <span class="q-counter">Câu ${current + 1} / ${questions.length}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${feedbackHTML}
      <div class="nav-row">
        <button class="nav-btn prev" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Trước</button>
        <button class="nav-btn next" onclick="${isLast ? 'finish()' : 'next()'}" ${!locked ? 'disabled' : ''}>
          ${isLast ? '🏆 Xem kết quả' : 'Tiếp →'}
        </button>
      </div>
    </div>
  `;
}

function updateProgress() {
  const total = questions.length;
  const done = userAnswers.filter(a => a !== null).length;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
}

function choose(i) {
  if (userAnswers[current] !== null) return;
  userAnswers[current] = i;
  if (i === questions[current].ans) score++;
  render();
}
function next() { if (current < questions.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }

function finish() {
  document.getElementById('quizArea').style.display = 'none';
  const ss = document.getElementById('scoreScreen');
  ss.classList.add('show');

  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('scoreExamLabel').textContent = EXAMS[currentExam].title + ' – Kết quả';
  document.getElementById('scoreNum').textContent = `${score}/${total}`;

  let emoji, desc;
  if (pct === 100)     { emoji = '🏆'; desc = 'Xuất sắc! Em trả lời đúng tất cả! Tuyệt vời lắm!'; launchConfetti(); }
  else if (pct >= 80)  { emoji = '🌟'; desc = 'Rất giỏi! Em làm bài rất tốt! Tiếp tục cố gắng nhé!'; launchConfetti(); }
  else if (pct >= 60)  { emoji = '😊'; desc = 'Tốt! Hãy xem lại những câu sai để ôn thêm nhé!'; }
  else                 { emoji = '📚'; desc = 'Cố gắng hơn nhé! Ôn tập thêm và làm lại em sẽ làm được!'; }

  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('scoreDesc').textContent = desc;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${total} / ${total}`;

  const letters = ['A','B','C','D'];
  let reviewHTML = `<div class="review-title">📝 Xem lại đáp án</div>`;
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const ok = ua === q.ans;
    reviewHTML += `<div class="review-item ${ok ? 'ok' : 'fail'}">
      <div class="review-q">${i+1}. ${q.q}</div>
      <div class="review-ans">`;
    if (ok) {
      reviewHTML += `✅ Em chọn đúng: <strong>${letters[q.ans]}. ${q.opts[q.ans]}</strong>`;
    } else {
      const uc = ua !== null
        ? `<span class="user-wrong">❌ Em chọn: ${letters[ua]}. ${q.opts[ua]}</span>`
        : `<span class="user-wrong">❌ Em chưa trả lời</span>`;
      reviewHTML += `${uc} &nbsp;|&nbsp; ✅ Đáp án đúng: <strong>${letters[q.ans]}. ${q.opts[q.ans]}</strong>`;
    }
    reviewHTML += `</div></div>`;
  });
  document.getElementById('reviewSection').innerHTML = reviewHTML;
  ss.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function retryExam() { startExam(); }
function scrollToExams() { document.querySelector('.exam-section').scrollIntoView({ behavior: 'smooth' }); }

function launchConfetti() {
  const colors = ['#FF7043','#29B6F6','#FFD54F','#66BB6A','#EF5350','#FF8A65','#26C6DA'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = 7 + Math.random() * 9;
      el.style.cssText = `left:${Math.random()*100}vw; width:${size}px; height:${size}px; background:${colors[Math.floor(Math.random()*colors.length)]}; animation-duration:${1.4+Math.random()*2}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 55);
  }
}

// background shapes
const shapesEl = document.getElementById('shapes');
['#FF7043','#FFD54F','#66BB6A','#29B6F6','#AB47BC'].forEach((c, i) => {
  for (let j = 0; j < 2; j++) {
    const el = document.createElement('div');
    el.className = 'shape';
    const size = 50 + Math.random() * 100;
    el.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*90}%;left:${Math.random()*90}%;background:${c};animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*4}s;border-radius:${Math.random()>.5?'50%':'20px'};`;
    shapesEl.appendChild(el);
  }
});

buildExamGrid();
startExam();
</script>
